version: "3.9"

services:

  mysql:
    image: mysql:8
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "5000:5000"

volumes:
  mysql_data: